services:
  library-dashboard:
    image: python:3.11-slim
    container_name: library-dashboard
    restart: unless-stopped
    working_dir: /app
    volumes:
      - /opt/library-dashboard:/app
      - /opt/media-history:/data/history:ro
      - /opt/media-data/library_history.db:/data/library_history.db:ro
      - /opt/imdb-data:/data/imdb:ro
    environment:
      - PYTHONUNBUFFERED=1
      - HISTORY_DIR=/data/history
      - RUNNER_URL=http://YOUR_RUNNER_HOST:5757
      - DB_PATH=/data/library_history.db
    ports:
      - "8686:8686"
    command: >
      bash -c "
        pip install flask pandas openpyxl requests --quiet &&
        python3 /app/app.py
      "
